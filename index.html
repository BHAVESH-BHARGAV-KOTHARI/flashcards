<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashCards</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <header id="title-bar">
    <h1>Flash Cards</h1>
    <div id="title-btns">
      <button id="add-card-btn">Add Card</button>
      <button id="theme-btn">☀️</button>
    </div>
  </header>

  <header id="filter-bar">

    <div>
      <label>Search:</label>
      <input type="text" id="search" placeholder="Find Card">
    </div>

    <div>
      <label>Difficulty:</label>
      <select name="difficulty" id="fetch-diff">
        <option>All</option>
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>

      <label>Topic:</label>
      <select name="topic" id="fetch-topic">
      </select>
    </div>

  </header>

  <section class="hero" id="hero"></section>

  <div id="form-container" class="hidden">
    <form id="add-card-form">
      <h1>Add Card</h1>
      <input name="topic" type="text" placeholder="Topic" required>
      <input name="question" type="text" placeholder="Question" required>
      <input name="answer" type="text" placeholder="Answer" required>

      <label>Difficulty:</label>
      <select name="difficulty">
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>

      <button type="submit" id="add-btn">Submit</button>
      <button type="button" id="cancel-btn">Cancel</button>

    </form>
  </div>


</body>
</html>
